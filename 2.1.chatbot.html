<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <!--
  1-component(line-22)
  2-component syntax,own HTML(line-37)
  3-fragment
  -->
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput(){
        return (
          //<input ></input>this are equal to below code
          <>
            {/* self closing element */}
            <input 
              placeholder="Send a mesage to Chatbot" 
              size="30"
            />
            <button>Send</button>
          </>
        );
      }
      function ChatMessage({message,sender}){
        //console.log(props);
        //const message=props.message;
        //const sender=props.sender;
        //const {message,sender}=props;//destructing instead of using function parameter

        /*if(sender==="robot"){
          return (
            <div>
              
              <img src="../images/2.0-robot.png" width="50"/>
              {message}
            </div>
          );
        }*///instaed of uing lellow code 
        return (
          <div>
            {sender==="robot" && (
              <img src="../images/2.0-robot.png" width="40"/>
            )}
            {message}
            {sender==="user" && (
              <img src="../images/2.0-user.png" width="40"/>
            )}
          </div>
        );
      }
      function App(){
        return (
          <>
            {/*{ChatInput()}*/}
            {/*component syntax;*/}
            <ChatInput />
            <ChatMessage 
              message="hello Chatbot" 
              sender="user"
            />
            <ChatMessage 
              message="Hello! How can I help you?"  
              sender="robot"
            />
            <ChatMessage 
              message="today dates" 
              sender="user"/>
            <ChatMessage 
              message="Today is April 3" 
              sender="robot"/>
          </>
        );
      }
      

      const container = document.querySelector('.js-container');
      //ReactDOM.createRoot(container).render('Welcome to SuperSimpleDev React Course');
      ReactDOM.createRoot(container).render(<App Welcome/>);
    </script>
  </body>
</html>
