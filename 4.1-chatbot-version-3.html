<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body{
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .send-button{
        background-color: rgb(25, 135, 84);
        border-radius: 10px;
        color: white;
        padding:12px 20px;
        margin-left: 10px;
        border: none;
        font-size: 15px;
        cursor: pointer;
      }
      .chat-Input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }
      .chat-Input-Container{
        display: flex;
        margin-bottom: 60px;
      }
      .app-Cointainer{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }
      .chat-message-text{
        background-color:rgb(238,238,238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }
      .chat-message-robot{
        display: flex;
        align-items: start;
      }
      .chat-message-profile{
        width: 45px;

      }
      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }
      .welcomeMsg{
        text-align: center;
        color: rgb(120,120,120);
      }
      .loading-spinner {
        height: 40px;
        margin: -15px;
      }
    </style>
  </head>
  <!--
  1-Styles
  -->
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({chatMessages,setChatMessages}){
        const [inputText,setInputText]=React.useState('');
        const [isLoading,setIsLoading]=React.useState(false);
        function saveInputText(event){
          setInputText(event.target.value);
          //console.log(text);
        }
        async function sendMessage(){
          //console.log(inputText);
           // Clear the textbox at the top now because the Chatbot
          // will take some time to load the response. We want
          // to clear the textbox immediately rather waiting
          // for the Chatbot to finish loading.
          // Set isLoading to true at the start, and set it to
          // false after everything is done.

          setIsLoading(true);

          // We can put this at the top of the function or
          // after the first setChatMessages(). Both work.

          setInputText('');

          const newChatMessage=[
          ...chatMessages,{
            message:inputText,
            sender:'user',
            id:crypto.randomUUID()
          }
          ];
          setChatMessages([
            ...newChatMessage,
            // This creates a temporary Loading... message.
            // Because we don't save this message in newChatMessages,
            // it will be remove later, when we add the response.
            {
              message: <img src="images/loading-spinner.gif" 
              className="loading-spinner" ></img>,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);



          const response=await Chatbot.getResponseAsync(inputText);
          //console.log(response);
          setChatMessages([
          ...newChatMessage,{
            message:response,
            sender:'robot',
            id:crypto.randomUUID()
          }
          ]);
          //setInputText('');
          setIsLoading(false);
        }
        function handleKeyDown(event){
          //console.log(event.key)
          if(event.key==='Enter'){
            sendMessage();
          }
          if(event.key==='Escape'){
            setInputText('');
          }
        }
        return (
          //<input ></input>this are equal to below code
          <div className="chat-Input-Container">
            {/* self closing element */}
            <input 
              placeholder="Send a mesage to Chatbot" 
              size="30"
              onChange={saveInputText}
              value={inputText}
              onKeyDown={handleKeyDown}
              className="chat-Input"
            />
            <button 
              onClick={sendMessage}
              className="send-button"
            >Send</button>
          </div>
        );
      }
      function ChatMessage({message,sender}){
        return (
          <div className={
            sender === 'user'  
              ? "chat-message-user" 
              : "chat-message-robot"
          }>
            {sender==="robot" && (
              <img src="../images/2.0-robot.png" className='chat-message-profile'/>
            )}
            <div className="chat-message-text">
              {message}
            </div>
            {sender==="user" && (
              <img src="../images/2.0-user.png" className='chat-message-profile'/>
            )}
          </div>
        );
      }
      function ChatMessages({chatMessages}){
        const chatMessagesRef=React.useRef(null);

        React.useEffect(()=>{
          //console.log('updated');
          const containerElem=chatMessagesRef.current;
          if(containerElem){
            containerElem.scrollTop=containerElem.scrollHeight;
          }
        },[chatMessages])
        return (
          <div className="chat-messages-container" ref={chatMessagesRef}>
            {/*<button onClick={sendMessage}>Send Message</button>*/}

           {chatMessages.map((chatMessage)=>{
                return (
                  <ChatMessage 
                    message={chatMessage.message}
                    sender={chatMessage.sender}
                    key={chatMessage.id}
                  />
                );
              })}
          </div>
        );
      }
      function App(){
        const [chatMessages,setChatMessages]=React.useState([]);
        return (
          <div className="app-Cointainer">
            {
              chatMessages.length==0 &&(
                <p className="welcomeMsg">Welcome to the chatbot project! Send a message using the textbox below</p>
              )
            }
            <ChatMessages 
              chatMessages={chatMessages} 
            />
            <ChatInput 
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
