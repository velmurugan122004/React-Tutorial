<!DOCTYPE html>
<html>
  <head>
    <title>Practice problem</title>
    <style>
      body{
        font-family: arial;
      }
      input{
        border-radius: 5px;
        padding: 10px;
        margin-bottom: 5px;
      }
      .inline-button{
        background-color: rgb(0,123,255);
        color: white;
        border: none;
        border-radius:5px;
        padding: 10px ;
        margin-right: 5px;
        margin-top: 10px;
        cursor: pointer;
      }
      .password-show{
        border-radius: 5px;
        padding: 10px;
        margin-bottom: 5px;
        margin-left: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function LoginForm(){
        const [showPassword, setShowPassword] = React.useState(false);
        function toggleShowPassword(){
          setShowPassword(!showPassword);
          /*
            Another solution is:
            if (showPassword) {
              setShowPassword(false);
            } else {
              setShowPassword(true);
            }
          */
        }
        return (
          <>
            <input placeholder="Email" className="email"/>
            <div>
            <input placeholder="Password" className="password" type={showPassword?'text':'password'}/>
            <button className="password-show"
            onClick={toggleShowPassword}>{showPassword?'Hide':'Show'}</button>
            </div>
            <button className="inline-button">Login</button>
            <button className="inline-button">Sign up</button>
          </>
        );
      }
      function Time(){
        const [time,setTime]=React.useState(
          dayjs().format('HH:mm:ss')
        );
        React.useEffect(()=>{
          setInterval(()=>{
            setTime(dayjs().format('HH:mm:ss'));
            
          },1000);
          console.log('run code');
          // Important: make sure to give React.useEffect()
        // a dependency array of [] so it only runs once!
         
        },[]);
        return (
          <p>Current time :{time}</p>
        );
      }
      function App(){
        
        return (
          <>
            <p>Hello ,welcome to my website</p>
            <Time />
            <LoginForm />
          </>
        );
      }
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
